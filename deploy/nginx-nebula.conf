# Nebula Panel – nginx Reverse Proxy
# Ablegen als: /etc/nginx/sites-available/nebula
# Aktivieren:  sudo ln -s /etc/nginx/sites-available/nebula /etc/nginx/sites-enabled/nebula
#
# HTTPS: einfach danach `sudo certbot --nginx -d panel.deinedomain.de` laufen
# lassen – Certbot erweitert diese Datei automatisch um SSL.

server {
    listen 80;
    listen [::]:80;

    # ANPASSEN: deine (Sub-)Domain.
    # Zugriff nur per IP/LAN ohne Domain? Dann stattdessen:  server_name _;
    # (und ggf. die Default-Site entfernen: sudo rm /etc/nginx/sites-enabled/default)
    server_name panel.deinedomain.de;

    # Etwas Luft für NZB-Uploads / größere API-Antworten
    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:8484;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Panel pollt die Dienste – Timeouts großzügig halten
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;

        # Session-Cookie unverändert durchreichen
        proxy_pass_header Set-Cookie;
    }

    # Optional: Zugriff zusätzlich auf dein LAN/VPN beschränken
    # allow 192.168.1.0/24;
    # allow 10.8.0.0/24;
    # deny all;
}
